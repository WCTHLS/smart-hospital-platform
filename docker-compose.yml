services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aarogya
      POSTGRES_PASSWORD: aarogya
      POSTGRES_DB: aarogya
    ports: ["55432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aarogya"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aarogya.org
      PGADMIN_DEFAULT_PASSWORD: admin
    ports: ["55050:80"]
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  # Optional self-hosted LLM. The backend falls back to the deterministic engine if this is absent.
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollama:/root/.ollama"]

  backend:
    build: ./backend
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://aarogya:aarogya@db:5432/aarogya
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports: ["8000:8000"]
    command: sh -c "python -m app.seed || true; uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on: [backend]
    ports: ["5173:5173"]

volumes:
  pgdata:
  ollama:
